name: Check Amazon prices

on:
  schedule:
    # Twice a month (1st & 15th, UTC). Full sweep ≈ 90 reqs × 5 credits = 450;
    # two sweeps ≈ 900 credits/mo, inside ScraperAPI's 1,000/mo free tier.
    - cron: "0 7 1,15 * *"
  workflow_dispatch: {}

permissions:
  contents: write

# Shared group with check.yml — see that file. Prevents the two jobs from
# committing docs/data/events.json concurrently (which dropped events).
concurrency:
  group: lumibricks-data
  cancel-in-progress: false

jobs:
  amazon:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Check Amazon prices
        env:
          SCRAPERAPI_KEY: ${{ secrets.SCRAPERAPI_KEY }}
          # 2 sweeps/mo × 90 × 5 credits = 900, inside the 1,000/mo free tier.
          AMAZON_MAX: "90"
        run: node scripts/amazon.mjs

      - name: Commit data changes (only if anything changed)
        run: |
          git config user.name "lumibricks-bot"
          git config user.email "actions@github.com"
          if [ -z "$(git status --porcelain docs/data)" ]; then
            echo "No Amazon data changes (or SCRAPERAPI_KEY not set yet)."
            exit 0
          fi
          git add docs/data
          git commit -m "data: refresh Amazon prices ($(date -u +%Y-%m-%dT%H:%MZ))"
          for attempt in 1 2 3 4 5; do
            if git push; then echo "Pushed updated Amazon data."; exit 0; fi
            echo "push rejected — rebasing onto latest (attempt $attempt)…"
            git fetch origin main && git rebase -X theirs origin/main || git rebase --abort
            sleep $((RANDOM % 5 + 2))
          done
          echo "Failed to push after retries"; exit 1
