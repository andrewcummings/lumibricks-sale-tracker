name: Check LumiBricks sales

on:
  schedule:
    # Every hour, on the hour (UTC). GitHub may delay scheduled runs under load.
    - cron: "0 * * * *"
  workflow_dispatch: {} # lets you trigger a run manually from the Actions tab
  push:
    branches: [main]
    paths:
      - "scripts/**"
      - ".github/workflows/check.yml"

permissions:
  contents: write # needed to commit the refreshed data files

# Shared group with amazon.yml: both read-merge-write docs/data/events.json, so
# they must never commit concurrently (they used to collide at 07:00 on the
# 1st/15th and the rebase -X theirs dropped one job's events). Serializing the
# two workflows closes that race.
concurrency:
  group: lumibricks-data
  cancel-in-progress: false

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Run sale checker
        run: node scripts/check.mjs
        env:
          # Dedicated inbox for discount-code emails. Unset → inbox channel is
          # skipped (no-op). IMAP_HOST/IMAP_FROM are optional overrides.
          IMAP_USER: ${{ secrets.IMAP_USER }}
          IMAP_PASS: ${{ secrets.IMAP_PASS }}

      - name: Commit data changes (only if anything changed)
        run: |
          git config user.name "lumibricks-bot"
          git config user.email "actions@github.com"
          if [ -z "$(git status --porcelain docs/data)" ]; then
            echo "No data changes — nothing to commit."
            exit 0
          fi
          git add docs/data
          git commit -m "data: refresh sales snapshot ($(date -u +%Y-%m-%dT%H:%MZ))"
          # Retry around races with the other scheduled jobs; our fresh data wins on conflict.
          for attempt in 1 2 3 4 5; do
            if git push; then echo "Pushed updated data."; exit 0; fi
            echo "push rejected — rebasing onto latest (attempt $attempt)…"
            git fetch origin main && git rebase -X theirs origin/main || git rebase --abort
            sleep $((RANDOM % 5 + 2))
          done
          echo "Failed to push after retries"; exit 1
