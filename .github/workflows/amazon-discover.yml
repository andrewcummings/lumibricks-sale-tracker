name: Discover Amazon ASINs

# Run this manually (Actions tab → Run workflow) to build/extend the set→ASIN map.
# It spends scraper credits, so it is NOT scheduled. Re-run to fill remaining gaps;
# matched and manual rows are left untouched. Review docs/data/asin-map.json after.

on:
  workflow_dispatch:
    inputs:
      max:
        description: "Max Amazon searches this run (protects your free quota)"
        required: false
        default: "40"

permissions:
  contents: write

jobs:
  discover:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Discover ASINs
        env:
          SCRAPERAPI_KEY: ${{ secrets.SCRAPERAPI_KEY }}
          DISCOVER_MAX: ${{ github.event.inputs.max }}
        run: node scripts/discover-asins.mjs

      - name: Commit ASIN map
        run: |
          git config user.name "lumibricks-bot"
          git config user.email "actions@github.com"
          if [ -z "$(git status --porcelain docs/data/asin-map.json)" ]; then
            echo "No ASIN map changes (or SCRAPERAPI_KEY not set yet)."
            exit 0
          fi
          git add docs/data/asin-map.json
          git commit -m "data: update Amazon ASIN map ($(date -u +%Y-%m-%dT%H:%MZ))"
          for attempt in 1 2 3 4 5; do
            if git push; then echo "Pushed updated ASIN map."; exit 0; fi
            echo "push rejected — rebasing onto latest (attempt $attempt)…"
            git fetch origin main && git rebase -X theirs origin/main || git rebase --abort
            sleep $((RANDOM % 5 + 2))
          done
          echo "Failed to push after retries"; exit 1
