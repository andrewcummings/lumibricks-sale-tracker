name: Check Amazon prices

on:
  schedule:
    # Twice a month (1st & 15th, UTC). Full sweep ≈ 90 reqs × 5 credits = 450;
    # two sweeps ≈ 900 credits/mo, inside ScraperAPI's 1,000/mo free tier.
    - cron: "0 7 1,15 * *"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: lumibricks-amazon
  cancel-in-progress: false

jobs:
  amazon:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Check Amazon prices
        env:
          SCRAPERAPI_KEY: ${{ secrets.SCRAPERAPI_KEY }}
          AMAZON_MAX: "120"
        run: node scripts/amazon.mjs

      - name: Commit data changes (only if anything changed)
        run: |
          git config user.name "lumibricks-bot"
          git config user.email "actions@github.com"
          if [ -n "$(git status --porcelain docs/data)" ]; then
            git add docs/data
            git commit -m "data: refresh Amazon prices ($(date -u +%Y-%m-%dT%H:%MZ))"
            git push
            echo "Pushed updated Amazon data."
          else
            echo "No Amazon data changes (or SCRAPERAPI_KEY not set yet)."
          fi
